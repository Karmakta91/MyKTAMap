<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MyKTAMap</title>

  <link rel="stylesheet" href="lib/leaflet/leaflet.css" />
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <!-- PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MyKTAMap">
  <meta name="mobile-web-app-capable" content="yes">
</head>

<body>

  <!-- DEBUG — capture silencieuse, accessible via ⚙️ -->
  <script src="js/debug.js"></script>

  <!-- CHARGEUR DE PLAN (masqué par défaut, affiché si pas de plan serveur) -->
  <div id="planLoaderOverlay" style="display:none;">
    <div id="planLoaderBox">
      <div class="loader-header">
        <span class="loader-titre">📦 Charger un plan</span>
      </div>

      <div class="loader-tabs">
        <button class="loader-tab active" id="tabFichiers" type="button">📁 Fichiers séparés</button>
        <button class="loader-tab"        id="tabZip"      type="button">📦 Archive ZIP</button>
      </div>

      <div class="loader-panel active" id="panelFichiers">
        <p class="loader-desc">
          Importe le fichier <code>plan-config.json</code> puis tous les fichiers associés.
        </p>
        <label class="loaderLabel" for="planConfigFile">Fichier plan-config.json</label>
        <input id="planConfigFile" type="file" accept=".json,application/json">
        <label class="loaderLabel" for="assetFiles">Fichiers associés</label>
        <input id="assetFiles" type="file" multiple>
      </div>

      <div class="loader-panel" id="panelZip">
        <p class="loader-desc">
          Importe une archive <code>.zip</code> contenant <code>plan-config.json</code>
          et tous les fichiers associés.
        </p>
        <div class="zip-drop-zone" id="zipDropZone">
          <span class="zip-icon">📦</span>
          Glisse ton archive ici<br>
          <span style="font-size:12px; opacity:0.6;">ou clique pour sélectionner</span>
          <input id="zipFile" type="file" accept=".zip,application/zip">
        </div>
        <div id="zipFileName"></div>
      </div>

      <div class="loaderActions">
        <button id="loadPlanBtn" type="button">Charger le plan</button>
        <button class="loader-btn-ghost" type="button" onclick="
          const a = document.createElement('a');
          a.href = 'data/myktamap.zip';
          a.download = 'myktamap.zip';
          a.click();
        ">Conf Exemple</button>
      </div>

      <!-- Mode performance -->
      <div class="loader-perf-wrap">
        <label class="loader-perf-label">
          <input type="checkbox" id="loaderPerfMode">
          <span>⚡ Mode performance</span>
        </label>
        <span class="loader-perf-hint">Recommandé pour les plans &gt; 50 Mo (JPEG volumineux)</span>
      </div>

      <div id="loaderStatus"></div>
    </div>
  </div>

  <!-- CARTE -->
  <div id="map" style="display:none;"></div>

  <!-- DEBUG — panneau de logs mobile, actif uniquement si ?debug=1 dans l'URL -->

</body>

  <!-- JSZip -->
  <!-- Leaflet -->
  <script src="lib/leaflet/leaflet.js"></script>

  <!-- JSZip -->
  <script src="lib/jszip.min.js"></script>

  <!-- APP JS -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/measure.js"></script>
  <script src="js/tiling.js"></script>
  <script src="js/map.js"></script>
  <script src="js/tracking.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/road.js"></script>
  <script src="js/createConf.js"></script>
  <script src="js/interface.js"></script>
  <script src="js/main.js"></script>

  <!-- LOADER SCRIPT -->
  <script>
    window.addEventListener("load", function () {
      const planConfigInput = document.getElementById("planConfigFile");
      const assetFilesInput = document.getElementById("assetFiles");
      const loadBtn         = document.getElementById("loadPlanBtn");
      const statusBox       = document.getElementById("loaderStatus");
      const tabFichiers     = document.getElementById("tabFichiers");
      const tabZip          = document.getElementById("tabZip");
      const panelFichiers   = document.getElementById("panelFichiers");
      const panelZip        = document.getElementById("panelZip");
      const zipDropZone     = document.getElementById("zipDropZone");
      const zipFileInput    = document.getElementById("zipFile");
      const zipFileName     = document.getElementById("zipFileName");

      let modeActif = "fichiers";

      tabFichiers.addEventListener("click", function () {
        modeActif = "fichiers";
        tabFichiers.classList.add("active"); tabZip.classList.remove("active");
        panelFichiers.classList.add("active"); panelZip.classList.remove("active");
        setStatus("");
      });

      tabZip.addEventListener("click", function () {
        modeActif = "zip";
        tabZip.classList.add("active"); tabFichiers.classList.remove("active");
        panelZip.classList.add("active"); panelFichiers.classList.remove("active");
        setStatus("");
      });

      zipDropZone.addEventListener("click", function () { zipFileInput.click(); });
      zipFileInput.addEventListener("change", function () {
        const f = zipFileInput.files[0];
        zipFileName.textContent = f ? "✅ " + f.name : "";
        // Suggérer mode perf si ZIP > 50Mo
        const cb = document.getElementById("loaderPerfMode");
        if (f && cb && f.size > 50 * 1024 * 1024) cb.checked = true;
      });

      zipDropZone.addEventListener("dragover",  function(e) { e.preventDefault(); zipDropZone.classList.add("dragover"); });
      zipDropZone.addEventListener("dragleave", function()  { zipDropZone.classList.remove("dragover"); });
      zipDropZone.addEventListener("drop", function(e) {
        e.preventDefault(); zipDropZone.classList.remove("dragover");
        const f = e.dataTransfer.files[0];
        if (f && f.name.toLowerCase().endsWith(".zip")) {
          const dt = new DataTransfer(); dt.items.add(f);
          zipFileInput.files = dt.files;
          zipFileName.textContent = "✅ " + f.name;
          const cb = document.getElementById("loaderPerfMode");
          if (cb && f.size > 50 * 1024 * 1024) cb.checked = true;
        } else {
          setStatus("Le fichier doit être une archive .zip", true);
        }
      });

      function setStatus(message, isError) {
        if (!statusBox) return;
        statusBox.textContent = message || "";
        statusBox.style.color = isError ? "#ffb3b3" : "#8cb4ff";
      }

      function guessMime(filename) {
        const ext = filename.split(".").pop().toLowerCase();
        return ({ json:"application/json", png:"image/png", jpg:"image/jpeg",
                  jpeg:"image/jpeg", gif:"image/gif", webp:"image/webp",
                  svg:"image/svg+xml" })[ext] || "application/octet-stream";
      }

      async function extraireZip(zipFile) {
        if (typeof JSZip === "undefined") throw new Error("JSZip non chargé. Vérifiez lib/jszip.min.js");
        const zip = await JSZip.loadAsync(zipFile);
        let planConfigFile = null;
        const assetFiles = [];
        for (const entry of Object.values(zip.files).filter(function(f) { return !f.dir; })) {
          const name = entry.name.split("/").pop();
          if (!name) continue;
          const blob = await entry.async("blob");
          const file = new File([blob], name, { type: guessMime(name) });
          if (name === "plan-config.json") planConfigFile = file;
          else assetFiles.push(file);
        }
        if (!planConfigFile) throw new Error("plan-config.json introuvable dans l'archive ZIP");
        return { planConfigFile, assetFiles };
      }

      async function onLoadPlanClick() {
        if (typeof window.startImportedPlan !== "function") {
          setStatus("startImportedPlan introuvable", true); return;
        }
        loadBtn.disabled = true;
        try {
          let planConfigFile, assetFiles;
          if (modeActif === "zip") {
            const zipFile = zipFileInput.files[0];
            if (!zipFile) { setStatus("Sélectionne d'abord une archive .zip", true); loadBtn.disabled = false; return; }
            setStatus("Extraction en cours…", false);
            const extracted = await extraireZip(zipFile);
            planConfigFile = extracted.planConfigFile;
            assetFiles     = extracted.assetFiles;
          } else {
            planConfigFile = planConfigInput?.files?.[0];
            assetFiles     = assetFilesInput?.files;
            if (!planConfigFile) { setStatus("Sélectionne d'abord plan-config.json", true); loadBtn.disabled = false; return; }
            if (!assetFiles || assetFiles.length === 0) { setStatus("Ajoute les fichiers associés", true); loadBtn.disabled = false; return; }
          }

          setStatus("Chargement en cours…", false);

          const cb = document.getElementById("loaderPerfMode");
          const perfChoisi = cb ? (cb.checked ? true : false) : null;
          try {
            const saved = JSON.parse(localStorage.getItem("app_user_prefs") || "{}");
            saved.perfMode = perfChoisi;
            localStorage.setItem("app_user_prefs", JSON.stringify(saved));
          } catch(e) {}

          await window.startImportedPlan(planConfigFile, assetFiles, perfChoisi);
          setStatus("Plan chargé avec succès.");
        } catch(err) {
          console.error("[Loader] Erreur :", err);
          setStatus("Erreur : " + (err.message || err), true);
          loadBtn.disabled = false;
        }
      }

      if (loadBtn) loadBtn.addEventListener("click", onLoadPlanClick);

      // Pré-cocher si préférence sauvegardée
      try {
        const saved = JSON.parse(localStorage.getItem("app_user_prefs") || "{}");
        const cb = document.getElementById("loaderPerfMode");
        if (cb && saved.perfMode === true) cb.checked = true;
      } catch(e) {}
    });
  </script>

  <!-- DEBUG — panneau de logs mobile, actif uniquement si ?debug=1 dans l'URL -->

</body>
</html>
